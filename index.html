<!DOCTYPE html>
<html lang="ru" data-bs-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Сода пищевая</title>

    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <style>
        .soda-package {
            border: 18px solid #e30613;           /* красный как на пачке */
            border-radius: 12px;
            padding: 12px;
            background: #ffcc00;                  /* жёлтый внешний слой */
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }

        .soda-label {
            background: #fff;
            border: 12px solid #ffcc00;
            border-radius: 6px;
            padding: 30px 25px 20px;
            position: relative;
            overflow: hidden;
        }

        .soda-title {
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            font-size: 4.2rem;
            font-weight: 900;
            line-height: 1;
            color: #1c1c1c;
            text-align: center;
            margin-bottom: 4px;
            letter-spacing: -3px;
        }

        .soda-subtitle {
            font-size: 1.35rem;
            color: #1c1c1c;
            text-align: center;
            font-style: italic;
            margin-bottom: 25px;
        }

        .code-wrapper {
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 8px;
            padding: 18px;
            font-size: 0.95rem;
            line-height: 1.45;
            margin-bottom: 25px;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.6);
        }

        .code-wrapper pre {
            margin: 0;
            overflow-x: auto;
        }

        .soda-footer {
            border-top: 3px solid #ffcc00;
            padding-top: 12px;
        }
        </style>

</head>
<body>

<section class="d-flex align-items-center min-vh-100 text-center text-md-start"
         style="background: linear-gradient(to bottom right, #713f12, #000); color: white;">
    <div class="container py-5 py-md-0">
        <div class="row align-items-center">

            <!-- Левый блок с текстом (на десктопе слева) -->
            <div class="col-lg-7">
                <h1 class="display-3 fw-black lh-1 mb-4 animate__animated animate__fadeInUp"
                    style="font-weight: 900; letter-spacing: -0.05em;">
                    Soda
                </h1>

                <p class="fs-4 fw-light text-white-75 mb-5 animate__animated animate__fadeInUp animate__delay-1s">
                    Создавай современные, яркие и быстрые интерфейсы за минуты.<br>
                    Полная свобода кастомизации без головной боли.
                </p>

                <div class="d-grid d-sm-flex gap-3 justify-content-center justify-content-md-start animate__animated animate__fadeInUp animate__delay-2s">
                    <a href="#" class="btn btn-primary btn-lg px-5 py-3 fw-bold shadow-lg"
                       style="background: linear-gradient(to right, #ff6b6b, #f94d6a); border: none;">
                        Попробовать бесплатно →
                    </a>
                    <a href="#" class="btn btn-outline-light btn-lg px-5 py-3">
                        Посмотреть примеры
                    </a>
                </div>

                <div class="mt-5 fs-6 text-white-50 d-flex gap-4 justify-content-center justify-content-md-start">
                    <span>★ 4.9 из 5</span>
                    <span>2 400+ проектов</span>
                    <span>Обновляется еженедельно</span>
                </div>
            </div>

            <!-- Правый блок — можно вставить скриншот, 3D-объект, видео-loop или иллюстрацию -->
            <div class="col-lg-5 d-none d-lg-block text-center">
                <!-- Здесь может быть <img src="hero-soda.png" class="img-fluid"> или three.js / lottie -->
                <div class="ratio ratio-1x1 bg-dark-subtle rounded-4 shadow-lg"
                     style="max-height: 500px; background: url('https://images.unsplash.com/photo-...') center/cover;">
                    <!-- или просто красивая заглушка -->
                </div>
            </div>

        </div>
    </div>

    <!-- стрелка вниз -->
    <a href="#next" class="position-absolute bottom-0 start-50 translate-middle-x mb-5 text-white">
        <i class="bi bi-chevron-down fs-1 animate__animated animate__infinite animate__pulse"></i>
    </a>
</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
