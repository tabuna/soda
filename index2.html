<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сода пищевая — классика с 1970-х</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Impact&family=PT+Sans:wght@700&display=swap" rel="stylesheet">
    <style>
        .box-border { border: 12px solid #ef2a2a; }
        .yellow-frame { border: 8px solid #ffcc00; }
        .hero-box {
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .hero-box:hover { transform: scale(1.03) rotate(1deg); }
    </style>
</head>
<body class="bg-[#1a1a1a] text-white overflow-x-hidden">

<!-- HERO = УПАКОВКА -->
<section class="min-h-screen flex items-center justify-center relative bg-gradient-to-br from-red-900 via-yellow-900 to-black">
    <div class="max-w-5xl mx-auto px-6 text-center relative z-10">

        <!-- Сама "коробка" -->
        <div class="hero-box bg-white box-border yellow-frame rounded-3xl p-10 max-w-[420px] mx-auto relative">

            <!-- Белое поле -->
            <div class="bg-white py-8 px-6 text-black">
                <h1 class="text-[92px] leading-none font-black tracking-tighter"
                    style="font-family: 'Impact', sans-serif;">
                    Сода
                </h1>
                <p class="text-5xl font-bold -mt-3 mb-8" style="font-family: 'Impact', sans-serif;">
                    пищевая
                </p>

                <!-- ГОСТы и логотипы (как на твоей упаковке) -->
                <div class="flex justify-center gap-6 mb-6 opacity-90">
                    <img src="https://i.imgur.com/8zqK2vP.png" alt="ГОСТ" class="h-10"> <!-- замени на свои изображения -->
                    <img src="https://i.imgur.com/1vX9k2L.png" alt="Знак качества" class="h-10">
                    <img src="https://i.imgur.com/5vL9p3M.png" alt="Ростест" class="h-10">
                </div>

                <p class="text-sm font-medium tracking-widest text-gray-600">ГОСТ 32802-2014</p>
            </div>

            <!-- Кнопки под "этикеткой" -->
            <div class="flex gap-4 justify-center mt-8">
                <a href="#"
                   class="bg-red-600 hover:bg-red-700 text-white font-bold text-xl px-10 py-5 rounded-xl transition-all active:scale-95">
                    Купить сейчас
                </a>
                <a href="#"
                   class="border-2 border-black text-black font-bold text-xl px-10 py-5 rounded-xl hover:bg-black hover:text-white transition-all">
                    Рецепты
                </a>
            </div>
        </div>

        <!-- Подзаголовок под коробкой -->
        <p class="mt-12 text-2xl max-w-md mx-auto font-light tracking-wide">
            Та самая сода, которой доверяли бабушки.<br>
            <span class="text-yellow-400">Чистая. Эффективная. Вечная.</span>
        </p>

        <!-- Trust bar -->
        <div class="mt-16 flex flex-wrap justify-center gap-8 text-sm opacity-75">
            <div>★ 4.98 • 14 872 отзыва</div>
            <div>С 1974 года</div>
            <div>Экологично • Без добавок</div>
        </div>
    </div>

    <!-- Декоративный блик сверху -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-96 h-96 bg-yellow-400/10 blur-3xl rounded-full"></div>
</section>

<!-- Дальше можно добавить блоки: рецепты, где купить, история и т.д. -->

</body>
</html>
